<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネットワークスペシャリスト 1問1答トレーナー</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --ok: #22c55e;
      --ng: #ef4444;
      --warn: #f59e0b;
      --line: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1000px, calc(100% - 24px));
      margin: 24px auto 48px;
    }
    .hero, .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 13px;
      color: var(--muted);
    }
    select, button, textarea {
      font: inherit;
    }
    select, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 12px 14px;
    }
    textarea {
      min-height: 132px;
      line-height: 1.7;
      resize: vertical;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .primary {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      font-weight: 700;
    }
    .secondary {
      background: #1e293b;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .danger {
      background: #3f1d1d;
      color: #fecaca;
      border: 1px solid #7f1d1d;
    }
    .card {
      padding: 20px;
      margin-bottom: 18px;
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      background: #0b1220;
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: var(--muted);
    }
    .badge.ok {
      color: #bbf7d0;
      border-color: rgba(34,197,94,.35);
      background: rgba(20, 83, 45, .28);
    }
    .badge.warn {
      color: #fde68a;
      border-color: rgba(245,158,11,.35);
      background: rgba(120, 53, 15, .28);
    }
    .progress-wrap {
      margin: 14px 0 8px;
      height: 10px;
      border-radius: 999px;
      background: #0b1220;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.14);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      transition: width .25s ease;
    }
    .q-ref {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .q-title {
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.65;
      margin: 0 0 16px;
      white-space: pre-wrap;
    }
    .case-box {
      background: rgba(15, 23, 42, .9);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .case-box h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .case-box p {
      margin: 0;
      color: #d1d5db;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .choices {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }
    .choice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.82);
      cursor: pointer;
    }
    .choice input {
      margin-top: 4px;
    }
    .choice strong {
      min-width: 20px;
    }
    .choice:hover {
      border-color: rgba(56, 189, 248, .45);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .result {
      margin-top: 18px;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.82);
      display: none;
    }
    .result.show { display: block; }
    .result.correct {
      border-color: rgba(34,197,94,.4);
      background: rgba(20,83,45,.2);
    }
    .result.incorrect {
      border-color: rgba(239,68,68,.4);
      background: rgba(127,29,29,.18);
    }
    .result h3 {
      margin: 0 0 10px;
    }
    .result p {
      margin: 8px 0 0;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .stat {
      padding: 16px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }
    .stat strong {
      display: block;
      font-size: 28px;
      margin-bottom: 4px;
    }
    .mini {
      font-size: 12px;
      color: var(--muted);
    }
    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .review-item {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.86);
      line-height: 1.7;
    }
    .review-item.correct { border-color: rgba(34,197,94,.35); }
    .review-item.incorrect { border-color: rgba(239,68,68,.35); }
    .muted {
      color: var(--muted);
    }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .hero, .card {
        padding: 16px;
      }
      .q-title {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>ネットワークスペシャリスト 1問1答トレーナー</h1>
      <p class="sub">
        午前Ⅰ・午前Ⅱは自動採点、午後Ⅰ・午後Ⅱは模範解答を見ながら自己採点できます。
        正解した問題はブラウザに保存され、次回以降はチェック付きで表示されます。
      </p>
      <div class="controls">
        <div class="field">
          <label for="segmentSelect">出題セグメント</label>
          <select id="segmentSelect">
            <option value="all">全セグメント</option>
            <option value="午前Ⅰ">午前Ⅰ</option>
            <option value="午前Ⅱ">午前Ⅱ</option>
            <option value="午後Ⅰ">午後Ⅰ</option>
            <option value="午後Ⅱ">午後Ⅱ</option>
          </select>
        </div>
        <div class="field">
          <label for="countSelect">問題数</label>
          <select id="countSelect">
            <option value="10">10問</option>
            <option value="30">30問</option>
            <option value="50">50問</option>
            <option value="100">100問</option>
          </select>
        </div>
        <div class="field">
          <label>正解履歴</label>
          <div id="historyInfo" class="badge">読み込み中...</div>
        </div>
        <div class="field">
          <label>操作</label>
          <div class="actions" style="margin-top:0;">
            <button id="startBtn" class="primary">出題開始</button>
            <button id="resetHistoryBtn" class="danger">正解履歴をリセット</button>
          </div>
        </div>
      </div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div class="badges">
          <span id="segmentBadge" class="badge"></span>
          <span id="progressBadge" class="badge"></span>
          <span id="historyBadge" class="badge hidden"></span>
          <span id="modeBadge" class="badge warn"></span>
        </div>
        <button id="quitBtn" class="secondary">終了して結果を見る</button>
      </div>

      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="questionRef" class="q-ref"></div>
      <div id="caseBox" class="case-box hidden">
        <h3 id="caseTitle"></h3>
        <p id="caseDescription"></p>
      </div>
      <h2 id="questionText" class="q-title"></h2>

      <div id="mcqArea">
        <div id="choices" class="choices"></div>
        <div class="actions">
          <button id="submitMcqBtn" class="primary">解答する</button>
        </div>
      </div>

      <div id="selfArea" class="hidden">
        <textarea id="selfAnswer" placeholder="ここに自分の解答を書いてください（午後問題は模範解答を見ながら自己採点）"></textarea>
        <div class="actions">
          <button id="showModelBtn" class="primary">模範解答を見る</button>
        </div>
      </div>

      <div id="resultBox" class="result">
        <h3 id="resultTitle"></h3>
        <p id="resultBody"></p>
        <div id="selfJudgeActions" class="actions hidden">
          <button id="markCorrectBtn" class="primary">この問題を正解にする</button>
          <button id="markIncorrectBtn" class="secondary">この問題を不正解にする</button>
        </div>
        <div id="nextArea" class="actions hidden">
          <button id="nextBtn" class="primary">次の問題へ</button>
        </div>
      </div>
    </section>

    <section id="summaryCard" class="card hidden">
      <div class="topbar">
        <div class="badges">
          <span id="finalSegmentBadge" class="badge"></span>
          <span id="finalCountBadge" class="badge"></span>
        </div>
        <button id="restartBtn" class="secondary">設定に戻る</button>
      </div>
      <h2 style="margin-top:0;">結果</h2>
      <p id="summaryLead" class="sub"></p>
      <div class="summary-grid">
        <div class="stat">
          <strong id="scoreMain">0 / 0</strong>
          <span class="mini">総合スコア</span>
        </div>
        <div class="stat">
          <strong id="scoreRate">0%</strong>
          <span class="mini">正答率</span>
        </div>
      </div>
      <div id="segmentBreakdown" class="review-list"></div>
      <div class="review-list" id="reviewList"></div>
    </section>
  </div>

  <script>
    const QUESTION_BANK = [{"id":"AM1-Q001","segment":"午前Ⅰ","type":"mcq","prompt":"192.168.10.0/24 を 4 つの等しいサブネットに分割したとき、各サブネットのプレフィックス長はどれか。","options":[{"key":"A","text":"/25"},{"key":"B","text":"/26"},{"key":"C","text":"/27"},{"key":"D","text":"/28"}],"answer":"B","explanation":"/24 を 4 分割すると 2bit 借用するので /26。","displayRef":"午前Ⅰ 問1"},{"id":"AM1-Q002","segment":"午前Ⅰ","type":"mcq","prompt":"10.0.0.0/24 のサブネットで、ホスト数が 50 台必要な場合に最も適切なプレフィックス長はどれか。","options":[{"key":"A","text":"/25"},{"key":"B","text":"/26"},{"key":"C","text":"/27"},{"key":"D","text":"/28"}],"answer":"B","explanation":"/26 は利用可能ホスト数 62。","displayRef":"午前Ⅰ 問2"},{"id":"AM1-Q003","segment":"午前Ⅰ","type":"mcq","prompt":"172.16.8.0/21 に含まれる IP アドレスの範囲として正しいものはどれか。","options":[{"key":"A","text":"172.16.8.0 ～ 172.16.15.255"},{"key":"B","text":"172.16.8.0 ～ 172.16.11.255"},{"key":"C","text":"172.16.8.0 ～ 172.16.31.255"},{"key":"D","text":"172.16.0.0 ～ 172.16.7.255"}],"answer":"A","explanation":"/21 は 8 ブロック幅。","displayRef":"午前Ⅰ 問3"},{"id":"AM1-Q004","segment":"午前Ⅰ","type":"mcq","prompt":"CIDR の説明として最も適切なものはどれか。","options":[{"key":"A","text":"クラスに固定されたアドレス割当方式"},{"key":"B","text":"経路集約と柔軟なプレフィックス長を可能にする方式"},{"key":"C","text":"VLAN を識別する方式"},{"key":"D","text":"NAT の変換表管理方式"}],"answer":"B","explanation":"CIDR はクラスレスで経路集約可能。","displayRef":"午前Ⅰ 問4"},{"id":"AM1-Q005","segment":"午前Ⅰ","type":"mcq","prompt":"プライベート IPv4 アドレス帯として正しいものはどれか。","options":[{"key":"A","text":"100.64.0.0/10"},{"key":"B","text":"169.254.0.0/16"},{"key":"C","text":"172.16.0.0/12"},{"key":"D","text":"224.0.0.0/4"}],"answer":"C","explanation":"RFC1918 の一つ。","displayRef":"午前Ⅰ 問5"},{"id":"AM1-Q006","segment":"午前Ⅰ","type":"mcq","prompt":"リンクローカル IPv4 アドレスの説明として正しいものはどれか。","options":[{"key":"A","text":"DHCP 失敗時などに自動設定される 169.254.0.0/16"},{"key":"B","text":"NAT 用の 10.0.0.0/8"},{"key":"C","text":"ループバック用の 127.0.0.0/8"},{"key":"D","text":"マルチキャスト用の 224.0.0.0/4"}],"answer":"A","explanation":"APIPA。","displayRef":"午前Ⅰ 問6"},{"id":"AM1-Q007","segment":"午前Ⅰ","type":"mcq","prompt":"デフォルトゲートウェイの役割として適切なものはどれか。","options":[{"key":"A","text":"DNS 名を IP アドレスに変換する"},{"key":"B","text":"同一セグメント内の端末を認証する"},{"key":"C","text":"宛先が同一サブネット外のときに転送先となるルータの IP アドレス"},{"key":"D","text":"DHCP で配布されたリース時間を保持する"}],"answer":"C","explanation":"L3 転送の次ホップ。","displayRef":"午前Ⅰ 問7"},{"id":"AM1-Q008","segment":"午前Ⅰ","type":"mcq","prompt":"/27 のサブネットにおける利用可能ホスト数はどれか。","options":[{"key":"A","text":"14"},{"key":"B","text":"30"},{"key":"C","text":"62"},{"key":"D","text":"126"}],"answer":"B","explanation":"2^(32-27)-2 = 30。","displayRef":"午前Ⅰ 問8"},{"id":"AM1-Q009","segment":"午前Ⅰ","type":"mcq","prompt":"255.255.255.240 に対応するプレフィックス長はどれか。","options":[{"key":"A","text":"/26"},{"key":"B","text":"/27"},{"key":"C","text":"/28"},{"key":"D","text":"/29"}],"answer":"C","explanation":"240 は 11110000。","displayRef":"午前Ⅰ 問9"},{"id":"AM1-Q010","segment":"午前Ⅰ","type":"mcq","prompt":"ホスト部が全て 1 の IPv4 アドレスを何というか。","options":[{"key":"A","text":"ユニキャストアドレス"},{"key":"B","text":"ブロードキャストアドレス"},{"key":"C","text":"エニキャストアドレス"},{"key":"D","text":"ループバックアドレス"}],"answer":"B","explanation":"そのサブネット内へのブロードキャスト。","displayRef":"午前Ⅰ 問10"},{"id":"AM1-Q011","segment":"午前Ⅰ","type":"mcq","prompt":"OSI 基本参照モデルで、ルーティングを主に扱う層はどれか。","options":[{"key":"A","text":"物理層"},{"key":"B","text":"データリンク層"},{"key":"C","text":"ネットワーク層"},{"key":"D","text":"セッション層"}],"answer":"C","explanation":"IP ルーティングは L3。","displayRef":"午前Ⅰ 問11"},{"id":"AM1-Q012","segment":"午前Ⅰ","type":"mcq","prompt":"HTTP/HTTPS が主に動作する層として最も適切なものはどれか。","options":[{"key":"A","text":"アプリケーション層"},{"key":"B","text":"トランスポート層"},{"key":"C","text":"データリンク層"},{"key":"D","text":"物理層"}],"answer":"A","explanation":"アプリ層プロトコル。","displayRef":"午前Ⅰ 問12"},{"id":"AM1-Q013","segment":"午前Ⅰ","type":"mcq","prompt":"TCP の特徴として正しいものはどれか。","options":[{"key":"A","text":"コネクションレスである"},{"key":"B","text":"再送制御や順序制御を行う"},{"key":"C","text":"マルチキャスト専用である"},{"key":"D","text":"NAT を不要にする"}],"answer":"B","explanation":"信頼性制御あり。","displayRef":"午前Ⅰ 問13"},{"id":"AM1-Q014","segment":"午前Ⅰ","type":"mcq","prompt":"UDP を利用することが多いプロトコルはどれか。","options":[{"key":"A","text":"FTP"},{"key":"B","text":"SMTP"},{"key":"C","text":"DNS 問合せ"},{"key":"D","text":"SSH"}],"answer":"C","explanation":"通常の DNS 問合せは UDP/53。","displayRef":"午前Ⅰ 問14"},{"id":"AM1-Q015","segment":"午前Ⅰ","type":"mcq","prompt":"ARP の役割として適切なものはどれか。","options":[{"key":"A","text":"IP アドレスから MAC アドレスを求める"},{"key":"B","text":"DNS 名から IP アドレスを求める"},{"key":"C","text":"ルーティング表を交換する"},{"key":"D","text":"メール配送経路を決定する"}],"answer":"A","explanation":"同一セグメントでアドレス解決。","displayRef":"午前Ⅰ 問15"},{"id":"AM1-Q016","segment":"午前Ⅰ","type":"mcq","prompt":"ICMP Echo Request/Reply を利用する代表的なコマンドはどれか。","options":[{"key":"A","text":"nslookup"},{"key":"B","text":"ping"},{"key":"C","text":"tracert"},{"key":"D","text":"arp"}],"answer":"B","explanation":"疎通確認。","displayRef":"午前Ⅰ 問16"},{"id":"AM1-Q017","segment":"午前Ⅰ","type":"mcq","prompt":"traceroute/tracert が経路確認に利用できる主な理由はどれか。","options":[{"key":"A","text":"DNS キャッシュを表示するから"},{"key":"B","text":"TTL を段階的に変えて ICMP 応答を得るから"},{"key":"C","text":"ARP テーブルを列挙するから"},{"key":"D","text":"NAT 変換表を取得するから"}],"answer":"B","explanation":"TTL 切れ応答を利用。","displayRef":"午前Ⅰ 問17"},{"id":"AM1-Q018","segment":"午前Ⅰ","type":"mcq","prompt":"Ethernet フレームの宛先 MAC アドレスを学習する主な機器はどれか。","options":[{"key":"A","text":"ルータ"},{"key":"B","text":"レイヤ3 スイッチ"},{"key":"C","text":"レイヤ2 スイッチ"},{"key":"D","text":"DNS サーバ"}],"answer":"C","explanation":"L2SW が MAC アドレス表を学習。","displayRef":"午前Ⅰ 問18"},{"id":"AM1-Q019","segment":"午前Ⅰ","type":"mcq","prompt":"データリンク層でエラー検出に使われる代表的な値はどれか。","options":[{"key":"A","text":"TTL"},{"key":"B","text":"FCS"},{"key":"C","text":"Window Size"},{"key":"D","text":"DSCP"}],"answer":"B","explanation":"Frame Check Sequence。","displayRef":"午前Ⅰ 問19"},{"id":"AM1-Q020","segment":"午前Ⅰ","type":"mcq","prompt":"MTU の意味として正しいものはどれか。","options":[{"key":"A","text":"回線の平均利用率"},{"key":"B","text":"1 回の転送で送信できる最大ペイロードサイズ"},{"key":"C","text":"ルータが保持する最大経路数"},{"key":"D","text":"TCP セッションの最大数"}     const HISTORY_KEY = "ns_quiz_correct_history_v1";

    const segmentSelect = document.getElementById("segmentSelect");
    const countSelect = document.getElementById("countSelect");
    const historyInfo = document.getElementById("historyInfo");
    const resetHistoryBtn = document.getElementById("resetHistoryBtn");
    const startBtn = document.getElementById("startBtn");

    const quizCard = document.getElementById("quizCard");
    const summaryCard = document.getElementById("summaryCard");

    const segmentBadge = document.getElementById("segmentBadge");
    const progressBadge = document.getElementById("progressBadge");
    const historyBadge = document.getElementById("historyBadge");
    const modeBadge = document.getElementById("modeBadge");
    const progressBar = document.getElementById("progressBar");
    const questionRef = document.getElementById("questionRef");
    const questionText = document.getElementById("questionText");

    const caseBox = document.getElementById("caseBox");
    const caseTitle = document.getElementById("caseTitle");
    const caseDescription = document.getElementById("caseDescription");

    const mcqArea = document.getElementById("mcqArea");
    const choices = document.getElementById("choices");
    const submitMcqBtn = document.getElementById("submitMcqBtn");

    const selfArea = document.getElementById("selfArea");
    const selfAnswer = document.getElementById("selfAnswer");
    const showModelBtn = document.getElementById("showModelBtn");

    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultBody = document.getElementById("resultBody");
    const selfJudgeActions = document.getElementById("selfJudgeActions");
    const markCorrectBtn = document.getElementById("markCorrectBtn");
    const markIncorrectBtn = document.getElementById("markIncorrectBtn");
    const nextArea = document.getElementById("nextArea");
    const nextBtn = document.getElementById("nextBtn");

    const quitBtn = document.getElementById("quitBtn");
    const restartBtn = document.getElementById("restartBtn");
    const finalSegmentBadge = document.getElementById("finalSegmentBadge");
    const finalCountBadge = document.getElementById("finalCountBadge");
    const summaryLead = document.getElementById("summaryLead");
    const scoreMain = document.getElementById("scoreMain");
    const scoreRate = document.getElementById("scoreRate");
    const segmentBreakdown = document.getElementById("segmentBreakdown");
    const reviewList = document.getElementById("reviewList");

    let correctHistory = loadHistory();
    let currentQuiz = [];
    let currentIndex = 0;
    let answers = [];
    let lastMode = "";

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
      } catch (e) {
        return {};
      }
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(correctHistory));
      updateHistoryInfo();
    }

    function getPool(segment) {
      return segment === "all" ? QUESTION_BANK : QUESTION_BANK.filter(q => q.segment === segment);
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateHistoryInfo() {
      const segment = segmentSelect.value;
      const pool = getPool(segment);
      const correctCount = pool.filter(q => correctHistory[q.id]).length;
      historyInfo.textContent = `${correctCount} / ${pool.length} 問が正解済み`;
    }

    function formatSegmentName(segment) {
      return segment === "all" ? "全セグメント" : segment;
    }

    function startQuiz() {
      const segment = segmentSelect.value;
      const count = Number(countSelect.value);
      const pool = getPool(segment);
      const picked = shuffle(pool).slice(0, Math.min(count, pool.length));

      currentQuiz = picked;
      currentIndex = 0;
      answers = [];

      summaryCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
      renderQuestion();
    }

    function currentQuestion() {
      return currentQuiz[currentIndex];
    }

    function renderQuestion() {
      const q = currentQuestion();
      const total = currentQuiz.length;
      const idx = currentIndex + 1;

      segmentBadge.textContent = q.segment;
      progressBadge.textContent = `${idx} / ${total}`;
      progressBar.style.width = `${(idx - 1) / total * 100}%`;
      questionRef.textContent = q.displayRef;
      questionText.textContent = q.prompt;
      resultBox.className = "result";
      resultTitle.textContent = "";
      resultBody.textContent = "";
      selfJudgeActions.classList.add("hidden");
      nextArea.classList.add("hidden");
      historyBadge.classList.toggle("hidden", !correctHistory[q.id]);
      historyBadge.textContent = "✓ 過去に正解済み";

      if (q.type === "mcq") {
        lastMode = "auto";
        modeBadge.textContent = "自動採点";
        caseBox.classList.add("hidden");
        mcqArea.classList.remove("hidden");
        selfArea.classList.add("hidden");
        choices.innerHTML = q.options.map(opt => `
          <label class="choice">
            <input type="radio" name="mcq" value="${opt.key}">
            <strong>${opt.key}.</strong>
            <span>${opt.text}</span>
          </label>
        `).join("");
      } else {
        lastMode = "self";
        modeBadge.textContent = "自己採点";
        caseBox.classList.remove("hidden");
        caseTitle.textContent = `ケース${q.caseNo}：${q.caseTitle}`;
        caseDescription.textContent = q.caseDescription;
        mcqArea.classList.add("hidden");
        selfArea.classList.remove("hidden");
        selfAnswer.value = "";
      }
    }

    function submitMcq() {
      const q = currentQuestion();
      const selected = document.querySelector('input[name="mcq"]:checked');
      if (!selected) {
        alert("選択肢を選んでください。");
        return;
      }
      const userAnswer = selected.value;
      const isCorrect = userAnswer === q.answer;
      answers.push({
        id: q.id,
        ref: q.displayRef,
        segment: q.segment,
        type: q.type,
        userAnswer,
        correctAnswer: q.answer,
        isCorrect
      });
      if (isCorrect) {
        correctHistory[q.id] = true;
        saveHistory();
      }
      resultBox.className = `result show ${isCorrect ? "correct" : "incorrect"}`;
      resultTitle.textContent = isCorrect ? "正解です" : "不正解です";
      resultBody.textContent = `あなたの解答：${userAnswer}\n正答：${q.answer}\n解説：${q.explanation}`;
      nextArea.classList.remove("hidden");
    }

    function showModelAnswer() {
      const q = currentQuestion();
      const written = selfAnswer.value.trim();
      resultBox.className = "result show";
      resultTitle.textContent = "模範解答を表示しました";
      const kw = q.keywords && q.keywords.length ? `\nキーワード例：${q.keywords.join(" / ")}` : "";
      resultBody.textContent = `あなたの解答：${written || "（未入力）"}\n模範解答：${q.modelAnswer}${kw}`;
      selfJudgeActions.classList.remove("hidden");
    }

    function judgeSelf(isCorrect) {
      const q = currentQuestion();
      answers.push({
        id: q.id,
        ref: q.displayRef,
        segment: q.segment,
        type: q.type,
        userAnswer: selfAnswer.value.trim(),
        correctAnswer: q.modelAnswer,
        isCorrect
      });
      if (isCorrect) {
        correctHistory[q.id] = true;
        saveHistory();
      }
      resultBox.className = `result show ${isCorrect ? "correct" : "incorrect"}`;
      resultTitle.textContent = isCorrect ? "正解として記録しました" : "不正解として記録しました";
      nextArea.classList.remove("hidden");
      selfJudgeActions.classList.add("hidden");
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= currentQuiz.length) {
        finishQuiz();
        return;
      }
      renderQuestion();
    }

    function finishQuiz() {
      quizCard.classList.add("hidden");
      summaryCard.classList.remove("hidden");
      progressBar.style.width = "100%";

      const total = answers.length;
      const correct = answers.filter(a => a.isCorrect).length;
      const rate = total ? Math.round((correct / total) * 100) : 0;

      finalSegmentBadge.textContent = formatSegmentName(segmentSelect.value);
      finalCountBadge.textContent = `${currentQuiz.length}問セット`;
      summaryLead.textContent = `結果は ${currentQuiz.length}問中 ${correct}点 です。午後問題を含む場合は、午後は自己採点結果を反映しています。`;
      scoreMain.textContent = `${correct} / ${currentQuiz.length}`;
      scoreRate.textContent = `${rate}%`;

      const segs = ["午前Ⅰ", "午前Ⅱ", "午後Ⅰ", "午後Ⅱ"];
      const breakdown = segs
        .map(seg => {
          const segAnswers = answers.filter(a => a.segment === seg);
          if (!segAnswers.length) return "";
          const segCorrect = segAnswers.filter(a => a.isCorrect).length;
          return `
            <div class="review-item">
              <strong>${seg}</strong><br>
              ${segAnswers.length}問中 ${segCorrect}点
            </div>
          `;
        })
        .join("");
      segmentBreakdown.innerHTML = breakdown;

      reviewList.innerHTML = answers.map(a => `
        <div class="review-item ${a.isCorrect ? "correct" : "incorrect"}">
          <strong>${a.isCorrect ? "○" : "×"} ${a.ref}</strong><br>
          <span class="muted">${a.segment}</span><br>
          ${a.type === "mcq"
              ? `あなたの解答：${a.userAnswer} / 正答：${a.correctAnswer}`
              : `自己採点：${a.isCorrect ? "正解" : "不正解"}`}
          ${correctHistory[a.id] ? '<br><span class="mini">✓ 過去に正解済み</span>' : ""}
        </div>
      `).join("");
    }

    startBtn.addEventListener("click", startQuiz);
    submitMcqBtn.addEventListener("click", submitMcq);
    showModelBtn.addEventListener("click", showModelAnswer);
    markCorrectBtn.addEventListener("click", () => judgeSelf(true));
    markIncorrectBtn.addEventListener("click", () => judgeSelf(false));
    nextBtn.addEventListener("click", nextQuestion);
    quitBtn.addEventListener("click", finishQuiz);
    restartBtn.addEventListener("click", () => {
      summaryCard.classList.add("hidden");
      quizCard.classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    resetHistoryBtn.addEventListener("click", () => {
      const ok = confirm("正解履歴をすべてリセットします。よろしいですか？");
      if (!ok) return;
      correctHistory = {};
      saveHistory();
    });

    segmentSelect.addEventListener("change", updateHistoryInfo);

    updateHistoryInfo();
  </script>
</body>
</html>
